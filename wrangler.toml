name = "theraspace"
main = "worker/index.ts"
compatibility_date = "2026-07-17"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./out"
not_found_handling = "404-page"
binding = "ASSETS"

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[vars]
ALLOWED_ORIGIN = "https://mytherapist.christech.co.ke"

# Set with `wrangler secret put <NAME>`, never commit real values here:
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   PAYSTACK_SECRET_KEY
#   RESEND_API_KEY               (optional)
#   CONTACT_NOTIFICATION_EMAIL   (optional)
